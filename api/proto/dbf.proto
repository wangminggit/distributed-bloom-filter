syntax = "proto3";

package dbf;

option go_package = "github.com/wangminggit/distributed-bloom-filter/api/proto";

// AuthMetadata contains authentication information for API key-based auth.
message AuthMetadata {
  // ApiKey is the API key for authentication.
  string api_key = 1;
  // Timestamp is the Unix timestamp of the request.
  int64 timestamp = 2;
  // Signature is the HMAC-SHA256 signature.
  string signature = 3;
}

// DBFService provides the gRPC API for the Distributed Bloom Filter.
service DBFService {
  // Add adds an item to the Bloom filter.
  rpc Add(AddRequest) returns (AddResponse);

  // Remove removes an item from the Bloom filter.
  rpc Remove(RemoveRequest) returns (RemoveResponse);

  // Contains checks if an item exists in the Bloom filter.
  rpc Contains(ContainsRequest) returns (ContainsResponse);

  // BatchAdd adds multiple items to the Bloom filter.
  rpc BatchAdd(BatchAddRequest) returns (BatchAddResponse);

  // BatchContains checks if multiple items exist in the Bloom filter.
  rpc BatchContains(BatchContainsRequest) returns (BatchContainsResponse);

  // GetStats returns statistics about the Bloom filter and node.
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
}

// AddRequest is the request message for the Add RPC.
message AddRequest {
  // The item to add to the Bloom filter.
  bytes item = 1;
}

// AddResponse is the response message for the Add RPC.
message AddResponse {
  // Success indicates whether the operation succeeded.
  bool success = 1;
  // Error contains an error message if the operation failed.
  string error = 2;
}

// RemoveRequest is the request message for the Remove RPC.
message RemoveRequest {
  // The item to remove from the Bloom filter.
  bytes item = 1;
}

// RemoveResponse is the response message for the Remove RPC.
message RemoveResponse {
  // Success indicates whether the operation succeeded.
  bool success = 1;
  // Error contains an error message if the operation failed.
  string error = 2;
}

// ContainsRequest is the request message for the Contains RPC.
message ContainsRequest {
  // The item to check in the Bloom filter.
  bytes item = 1;
}

// ContainsResponse is the response message for the Contains RPC.
message ContainsResponse {
  // Exists indicates whether the item is in the Bloom filter.
  bool exists = 1;
  // Error contains an error message if the operation failed.
  string error = 2;
}

// BatchAddRequest is the request message for the BatchAdd RPC.
message BatchAddRequest {
  // The items to add to the Bloom filter.
  repeated bytes items = 1;
}

// BatchAddResponse is the response message for the BatchAdd RPC.
message BatchAddResponse {
  // SuccessCount is the number of items successfully added.
  int32 success_count = 1;
  // FailureCount is the number of items that failed to add.
  int32 failure_count = 2;
  // Errors contains error messages for failed items (indexed by item position).
  repeated string errors = 3;
}

// BatchContainsRequest is the request message for the BatchContains RPC.
message BatchContainsRequest {
  // The items to check in the Bloom filter.
  repeated bytes items = 1;
}

// BatchContainsResponse is the response message for the BatchContains RPC.
message BatchContainsResponse {
  // Results contains the existence status for each item.
  repeated bool results = 1;
  // Error contains an error message if the operation failed.
  string error = 2;
}

// GetStatsRequest is the request message for the GetStats RPC.
message GetStatsRequest {
  // Empty message, no parameters needed.
}

// GetStatsResponse is the response message for the GetStats RPC.
message GetStatsResponse {
  // NodeID is the unique identifier of this node.
  string node_id = 1;
  // IsLeader indicates whether this node is the Raft leader.
  bool is_leader = 2;
  // RaftState is the current Raft state (e.g., "Leader", "Follower", "Candidate").
  string raft_state = 3;
  // Leader is the address of the current Raft leader.
  string leader = 4;
  // BloomSize is the size of the Bloom filter in bits.
  int64 bloom_size = 5;
  // BloomK is the number of hash functions.
  int32 bloom_k = 6;
  // BloomCount is the approximate number of items in the filter.
  int64 bloom_count = 7;
  // RaftPort is the port used for Raft consensus.
  int32 raft_port = 8;
  // Error contains an error message if the operation failed.
  string error = 9;
}
