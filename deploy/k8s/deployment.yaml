apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbf-gateway
  namespace: dbf
  labels:
    app: distributed-bloom-filter
    component: gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: distributed-bloom-filter
      component: gateway
  template:
    metadata:
      labels:
        app: distributed-bloom-filter
        component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: distributed-bloom-filter
                    component: gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: gateway
          image: yourorg/dbf-gateway:v0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --storage-nodes=dbf-storage-0,dbf-storage-1,dbf-storage-2,dbf-storage-3,dbf-storage-4,dbf-storage-5
            - --port=50051
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dbf-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
