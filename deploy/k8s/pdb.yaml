# PDB for Storage nodes
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dbf-storage
  namespace: dbf
  labels:
    app: distributed-bloom-filter
    component: storage
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app: distributed-bloom-filter
      component: storage
---
# PDB for Gateway
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dbf-gateway
  namespace: dbf
  labels:
    app: distributed-bloom-filter
    component: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: distributed-bloom-filter
      component: gateway
