# Headless Service for StatefulSet (Raft peer discovery)
apiVersion: v1
kind: Service
metadata:
  name: dbf-storage-headless
  namespace: dbf
  labels:
    app: distributed-bloom-filter
    component: storage
spec:
  clusterIP: None
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: raft
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: distributed-bloom-filter
    component: storage
---
# LoadBalancer Service for external access
apiVersion: v1
kind: Service
metadata:
  name: dbf-gateway
  namespace: dbf
  labels:
    app: distributed-bloom-filter
    component: gateway
  annotations:
    # AWS NLB 示例配置
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"
spec:
  type: LoadBalancer
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: distributed-bloom-filter
    component: gateway
---
# ClusterIP Service for internal access
apiVersion: v1
kind: Service
metadata:
  name: dbf-storage
  namespace: dbf
  labels:
    app: distributed-bloom-filter
    component: storage
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: raft
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: distributed-bloom-filter
    component: storage
